<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ClawGuard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Menlo','Monaco','Courier New',monospace;background:#0a0a0f;color:#e0e0e0;font-size:13px;overflow:hidden;height:100vh}
#header{background:linear-gradient(90deg,#0a0a0f,#111128,#0a0a0f);border-bottom:1px solid #1a1a3e;padding:12px 20px;display:flex;justify-content:space-between;align-items:center}
#logo{font-size:20px;font-weight:700;background:linear-gradient(135deg,#2dd4bf,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#version{color:#555;font-size:11px;margin-left:8px}
#stats{display:flex;gap:1px;background:#111;border-bottom:1px solid #1a1a3e}
.stat{flex:1;padding:10px 16px;background:#0d0d15}
.stat-label{font-size:10px;color:#555;letter-spacing:1.5px;margin-bottom:4px}
.stat-value{font-size:22px;font-weight:700}
#feed{flex:1;overflow-y:auto;padding:16px}
.event{display:flex;align-items:flex-start;gap:10px;padding:8px 12px;margin-bottom:2px;border-radius:2px;cursor:default;transition:background 0.15s}
.event:hover{background:rgba(255,255,255,0.04)}
.event-icon{font-size:16px;width:24px;text-align:center}
.event-ts{color:#555;min-width:75px;font-size:11px;margin-top:2px}
.event-type{color:#818cf8;min-width:90px;font-size:11px;margin-top:2px}
.event-detail{flex:1;font-size:12px}
.risk-badge{font-size:10px;padding:2px 6px;border-radius:3px;min-width:20px;text-align:center}
.r0{border-left:3px solid #2dd4bf;background:rgba(45,212,191,0.05)}.r0 .risk-badge{background:rgba(45,212,191,0.15);color:#2dd4bf;border:1px solid rgba(45,212,191,0.3)}
.r1{border-left:3px solid #a3e635;background:rgba(163,230,53,0.05)}.r1 .risk-badge{background:rgba(163,230,53,0.15);color:#a3e635;border:1px solid rgba(163,230,53,0.3)}
.r2{border-left:3px solid #fbbf24;background:rgba(251,191,36,0.05)}.r2 .risk-badge{background:rgba(251,191,36,0.15);color:#fbbf24;border:1px solid rgba(251,191,36,0.3)}
.r3{border-left:3px solid #fb923c;background:rgba(251,146,60,0.05)}.r3 .risk-badge{background:rgba(251,146,60,0.15);color:#fb923c;border:1px solid rgba(251,146,60,0.3)}
.r4{border-left:3px solid #f87171;background:rgba(248,113,113,0.08)}.r4 .risk-badge{background:rgba(248,113,113,0.15);color:#f87171;border:1px solid rgba(248,113,113,0.3)}
.r5{border-left:3px solid #ef4444;background:rgba(239,68,68,0.1)}.r5 .risk-badge{background:rgba(239,68,68,0.2);color:#ef4444;border:1px solid rgba(239,68,68,0.4)}
.r5 .event-detail{color:#f87171}
#empty{text-align:center;color:#333;margin-top:80px;font-size:14px}
#controls{padding:8px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1a1a3e}
#controls span{color:#555;font-size:11px;letter-spacing:1px}
button{padding:5px 14px;border:1px solid #2dd4bf;border-radius:4px;background:transparent;color:#2dd4bf;cursor:pointer;font-size:11px;font-family:inherit}
button:hover{background:rgba(45,212,191,0.1)}
.alert-banner{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.4);border-radius:4px;padding:10px 16px;margin:8px 16px;font-size:12px;color:#f87171;display:none}
.alert-banner.show{display:block}
#app{display:flex;flex-direction:column;height:100vh}
</style>
</head>
<body>
<div id="app">
<div id="header">
<div style="display:flex;align-items:center;gap:12px"><span id="logo">◈ CLAWGUARD</span><span id="version">v0.1.0-alpha</span></div>
<div style="display:flex;gap:8px">
<button onclick="loadEvents()">↻ Refresh</button>
<button id="killBtn" style="border-color:#ef4444;color:#ef4444" onclick="killSwitch()">⚡ Kill Switch</button>
</div>
</div>
<div id="stats">
<div class="stat"><div class="stat-label">EVENTS</div><div class="stat-value" id="s-events" style="color:#818cf8">0</div></div>
<div class="stat"><div class="stat-label">CRITICAL</div><div class="stat-value" id="s-critical" style="color:#2dd4bf">0</div></div>
<div class="stat"><div class="stat-label">WARNINGS</div><div class="stat-value" id="s-warnings" style="color:#2dd4bf">0</div></div>
<div class="stat"><div class="stat-label">AVG RISK</div><div class="stat-value" id="s-avgrisk" style="color:#818cf8">0.00</div></div>
<div class="stat"><div class="stat-label">STATUS</div><div class="stat-value" id="s-status" style="color:#2dd4bf">●</div></div>
</div>
<div class="alert-banner" id="alertBanner">🚨 THREAT DETECTED</div>
<div id="controls"><span>LIVE EVENT STREAM</span><span id="eventCount">0 events</span></div>
<div id="feed"><div id="empty">◈ Waiting for agent events...<br><br>Start the OpenClaw gateway to see live activity.</div></div>
</div>
<script>
const ICONS={gateway:"🚀",message:"📥",command:"🔧",alert:"🚨",tool_call:"🔧",data_read:"📄",cred_access:"🔑",net_call:"🌐",skill_load:"📦",memory_write:"💾",error:"❌"};
let events=[];
let polling=null;

async function loadEvents(){
  try{
    const r=await fetch("clawguard://events");
    const data=await r.json();
    if(data.length>events.length){events=data;render()}
  }catch{
    try{
      const r=await window.__TAURI__.invoke("load_events");
      if(r&&r.length>events.length){events=r;render()}
    }catch(e){console.log("Waiting for backend...",e)}
  }
}

function render(){
  const feed=document.getElementById("feed");
  const criticals=events.filter(e=>e.risk>=4).length;
  const warnings=events.filter(e=>e.risk>=2&&e.risk<4).length;
  const avg=events.length?events.reduce((a,b)=>a+b.risk,0)/events.length:0;
  document.getElementById("s-events").textContent=events.length;
  document.getElementById("s-critical").textContent=criticals;
  document.getElementById("s-critical").style.color=criticals>0?"#ef4444":"#2dd4bf";
  document.getElementById("s-warnings").textContent=warnings;
  document.getElementById("s-warnings").style.color=warnings>0?"#fbbf24":"#2dd4bf";
  document.getElementById("s-avgrisk").textContent=avg.toFixed(2);
  document.getElementById("s-status").textContent="● LIVE";
  document.getElementById("s-status").style.color="#2dd4bf";
  document.getElementById("eventCount").textContent=events.length+" events";
  if(criticals>0){document.getElementById("alertBanner").classList.add("show");document.getElementById("alertBanner").textContent="🚨 "+criticals+" CRITICAL ALERT(S) — "+events.filter(e=>e.risk>=4).slice(-1)[0]?.detail}
  let html="";
  [...events].reverse().forEach(e=>{
    const icon=ICONS[e.type]||"•";
    const ts=e.timestamp?.split("T")[1]?.slice(0,12)||"";
    const r=Math.min(e.risk||0,5);
    html+=`<div class="event r${r}"><span class="event-icon">${icon}</span><span class="event-ts">${ts}</span><span class="event-type">${e.type}:${e.action}</span><span class="event-detail">${e.detail||""}</span><span class="risk-badge">${r}</span></div>`;
  });
  feed.innerHTML=html||document.getElementById("empty").outerHTML;
}

function killSwitch(){
  if(confirm("⚡ KILL SWITCH: This will attempt to stop the OpenClaw gateway. Continue?")){
    try{window.__TAURI__.invoke("kill_agent")}catch{}
    document.getElementById("s-status").textContent="● KILLED";
    document.getElementById("s-status").style.color="#ef4444";
    document.getElementById("killBtn").textContent="Agent Stopped";
    document.getElementById("killBtn").disabled=true;
  }
}

polling=setInterval(loadEvents,2000);
loadEvents();
</script>
</body>
</html>
